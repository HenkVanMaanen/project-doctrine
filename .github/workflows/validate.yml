name: Validate doctrine

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly link check, Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  structure:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Structural validation
        run: python3 scripts/validate_doctrine.py

  links:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Structural validation + external link check
        run: python3 scripts/validate_doctrine.py --links
